const cv=document.getElementById('cv'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
const result=document.getElementById('result'),rollBtn=document.getElementById('roll'),countsEl=document.getElementById('counts');
const sndBtn=document.getElementById('snd'),musBtn=document.getElementById('mus');
const LAYOUT={1:[[180,180]],2:[[110,180],[250,180]],4:[[108,108],[252,108],[108,252],[252,252]]};
const ROTS=[0,90,180,270];

let soundOn=true,actx=null,noiseBuf=null;

function ri(n){return Math.floor(Math.random()*n);}
function rand6(){return 1+ri(6);}
function sample2(){let a=ri(6),b;do{b=ri(6);}while(b===a);return[a,b];}
function forbidden(p){const s=p.slice().sort().join();return s==='0,1'||s==='2,3';}
function pickRows(){if(Math.random()<0.8)return[ri(6)];let r;do{r=sample2();}while(forbidden(r));return r;}
function audio(){if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();return actx;}
function getNoise(){if(noiseBuf)return noiseBuf;const a=audio(),len=Math.floor(a.sampleRate);noiseBuf=a.createBuffer(1,len,a.sampleRate);const d=noiseBuf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return noiseBuf;}
function blip(t,freq){const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type='square';o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(freq*0.6,t+0.05);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.06,t+0.004);g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
  o.connect(g).connect(a.destination);o.start(t);o.stop(t+0.07);}
function coin(t){const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type='square';o.frequency.setValueAtTime(988,t);o.frequency.setValueAtTime(1319,t+0.07);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.13,t+0.01);g.gain.setValueAtTime(0.13,t+0.07);g.gain.exponentialRampToValueAtTime(0.0001,t+0.33);
  o.connect(g).connect(a.destination);o.start(t);o.stop(t+0.34);}
function whoosh(t,dur){const a=audio(),src=a.createBufferSource();src.buffer=getNoise();src.loop=true;
  const bp=a.createBiquadFilter();bp.type='bandpass';bp.Q.value=1.1;
  bp.frequency.setValueAtTime(1100,t);bp.frequency.exponentialRampToValueAtTime(240,t+dur);
  const g=a.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.11,t+0.02);g.gain.setValueAtTime(0.11,t+0.05);g.gain.exponentialRampToValueAtTime(0.0001,t+Math.max(dur,0.25));
  src.connect(bp).connect(g).connect(a.destination);src.start(t);src.stop(t+dur+0.06);}
const PROG=[{a:[440,523,659],b:110},{a:[349,440,523],b:87},{a:[523,659,784],b:131},{a:[392,494,587],b:98}];
let melody=[],bassline=[];
for(const c of PROG){const p=[c.a[0],c.a[1],c.a[2],c.a[1],c.a[0],c.a[2],c.a[1],0];for(let s=0;s<8;s++){melody.push(p[s]);bassline.push((s===0||s===4)?c.b:0);}}
const STEPDUR=60/100/2;
function mNote(freq,t,dur,type,vol){const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(a.destination);o.start(t);o.stop(t+dur+0.03);}
function mTick(){const a=audio();while(mNext<a.currentTime+0.14){const i=mStep%melody.length;
  if(melody[i])mNote(melody[i],mNext,STEPDUR*0.85,'square',0.028);
  if(bassline[i])mNote(bassline[i],mNext,STEPDUR*1.7,'triangle',0.045);
  mNext+=STEPDUR;mStep++;}}
function startMusic(){if(musicRunning)return;const a=audio();if(a.state==='suspended')a.resume();musicRunning=true;mNext=a.currentTime+0.1;mStep=0;mTimer=setInterval(mTick,30);}
function stopMusic(){musicRunning=false;if(mTimer)clearInterval(mTimer);mTimer=null;}
function clearBg(){ctx.globalAlpha=1;ctx.fillStyle=BG;ctx.fillRect(0,0,VIEW,VIEW);}
function drawSheet(img,sx,sy,cx,cy,rot,alpha,mul){mul=mul||1;ctx.save();ctx.globalAlpha=alpha;
  ctx.translate(cx,cy);ctx.rotate(rot*Math.PI/180);ctx.scale(S*mul,S*mul);ctx.drawImage(img,sx,sy,FW,FW,-48,-48,FW,FW);ctx.restore();}
function drawFace(n,cx,cy,mul){drawSheet(dice,1*FW,(n-1)*FW,cx,cy,0,1,mul);}
function drawSpec(sp,cx,cy){drawSheet(dice,sp.f*FW,(sp.n-1)*FW,cx,cy,sp.rot,1);
  if(sp.whisp&&sp.wa>0)for(const rc of sp.whisp)drawSheet(vfx,rc[1]*FW,rc[0]*FW,cx,cy,sp.rot,sp.wa);}
function drawShadow(cx,cy,scale,alpha){const ox=cx+3,oy=cy+7;ctx.save();ctx.fillStyle='#070312';
  ctx.globalAlpha=alpha*0.40;ctx.beginPath();ctx.ellipse(ox,oy,29*scale,26*scale,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=alpha*0.72;ctx.beginPath();ctx.ellipse(ox,oy,22*scale,20*scale,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function buildSchedule(rank){const T=rand6();const revs=8+rank;let specs=[];
  for(let rv=0;rv<revs;rv++){const n=rand6(),rot=ROTS[ri(4)],rows=pickRows();const wdir=Math.random()<0.6?[0,1,2]:[2,1,0];
    for(let j=0;j<3;j++)specs.push({n:n,f:j,whisp:rows.map(r=>[r,wdir[j]]),rot:rot});}
  specs.push({n:T,f:0,whisp:[[ri(6),1]],rot:ROTS[ri(4)]});
  const L=specs.length;let steps=[];
  for(let i=0;i<L;i++){const t=i/(L-1);const dur=Math.round(67+(200-67)*Math.pow(t,2.0));
    const fps=1000/dur;const wa=fps<=5?0:Math.min(1,(fps-5)/1.2);
    steps.push({kind:'tumble',spec:specs[i],wa:wa,dur:dur,rev:(i%3===0)});}
  steps.push({kind:'sq',face:T,mul:0.80,sh:1.30,sa:1,dur:70,spark:true});
  steps.push({kind:'sq',face:T,mul:1.13,sh:0.85,sa:0.8,dur:78});
  steps.push({kind:'sq',face:T,mul:0.96,sh:1.0,sa:1,dur:60});

  return {T:T,steps:steps,total:acc,sparked:false};}
function scheduleAudio(){if(!soundOn)return;const a=audio();if(a.state==='suspended')a.resume();const base=a.currentTime+0.008;
  let wd=0;for(const sc of schedules){for(const st of sc.steps){if(st.spark){if(st.start>wd)wd=st.start;break;}}}
  whoosh(base,wd/1000);
  for(let k=0;k<count;k++){const sc=schedules[k];for(const st of sc.steps){
    if(st.kind==='tumble'&&st.rev)blip(base+st.start/1000,200+ri(180));
    else if(st.spark)coin(base+st.start/1000);}}}
function spawnSparkles(cx,cy,now){const cols=['#6ef3ff','#ffd75e','#ffffff'];
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,d=12+Math.random()*30;
    sparkles.push({cx:cx,cy:cy,a:a,d:d,t0:now,life:280+Math.random()*180,col:cols[ri(3)]});}}
function drawSparkles(now){sparkles=sparkles.filter(s=>now-s.t0<s.life);
  for(const s of sparkles){const e=(now-s.t0)/s.life,ease=1-Math.pow(1-e,2);
    const x=s.cx+Math.cos(s.a)*s.d*ease,y=s.cy+Math.sin(s.a)*s.d*ease,sz=(1-e)*3.5+1.2;
    ctx.save();ctx.globalAlpha=1-e;ctx.fillStyle=s.col;ctx.fillRect(x-sz,y-1,sz*2,2);ctx.fillRect(x-1,y-sz,2,sz*2);ctx.restore();}}
function drawDie(st,cx,cy){
  if(st.kind==='tumble'){const up=st.spec.f!==1;drawShadow(cx,cy,up?1.16:1.0,up?0.6:1.0);st.spec.wa=st.wa;drawSpec(st.spec,cx,cy);}
  else if(st.kind==='sq'){drawShadow(cx,cy,st.sh,st.sa);drawFace(st.face,cx,cy,st.mul);}
  else{drawShadow(cx,cy,1,1);drawFace(st.face,cx,cy,1);}}
function render(){const now=performance.now()-t0;clearBg();let done=true;
  for(let k=0;k<count;k++){const sc=schedules[k],slot=LAYOUT[count][k];if(now<sc.total)done=false;
    let st=sc.steps[sc.steps.length-1];for(const s of sc.steps){if(now<s.end){st=s;break;}}
    if(st.spark&&!sc.sparked){sc.sparked=true;spawnSparkles(slot[0],slot[1],now);}
    drawDie(st,slot[0],slot[1]);}
  drawSparkles(now);if(!done||sparkles.length)requestAnimationFrame(render);else finish();}
function finish(){clearBg();
  for(let k=0;k<count;k++){drawShadow(LAYOUT[count][k][0],LAYOUT[count][k][1],1,1);drawFace(Ts[k],LAYOUT[count][k][0],LAYOUT[count][k][1],1);}
  const total=Ts.reduce((a,b)=>a+b,0);
  result.textContent=count===1?('You rolled '+total):(Ts.join(' + ')+' = '+total);rolling=false;setEnabled(true);}
function setEnabled(b){rollBtn.disabled=!b;countsEl.querySelectorAll('button').forEach(x=>x.disabled=!b);}
function drawIdle(){clearBg();for(let k=0;k<count;k++){drawShadow(LAYOUT[count][k][0],LAYOUT[count][k][1],1,1);drawFace(Ts[k]||1,LAYOUT[count][k][0],LAYOUT[count][k][1],1);}}
function ensureMusic(){if(musicWanted&&!musicRunning)startMusic();}
function roll(){if(rolling||loaded<2)return;rolling=true;setEnabled(false);result.innerHTML='&nbsp;';sparkles=[];schedules=[];
  for(let k=0;k<count;k++)schedules.push(buildSchedule(k));
  Ts=schedules.map(s=>s.T);ensureMusic();t0=performance.now();scheduleAudio();requestAnimationFrame(render);}
countsEl.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||rolling)return;
  count=parseInt(b.dataset.c);countsEl.querySelectorAll('button').forEach(x=>x.classList.toggle('sel',x===b));
  Ts=[];result.innerHTML='&nbsp;';drawIdle();});
rollBtn.addEventListener('click',roll);
sndBtn.addEventListener('click',()=>{soundOn=!soundOn;sndBtn.classList.toggle('off',!soundOn);sndBtn.innerHTML=soundOn?'&#9834; SFX on':'&#9834; SFX off';});
musBtn.addEventListener('click',()=>{musicWanted=!musicWanted;musBtn.classList.toggle('off',!musicWanted);musBtn.innerHTML=musicWanted?'&#9835; Music on':'&#9835; Music off';if(musicWanted)startMusic();else stopMusic();});
function ready(){loaded++;if(loaded===2)drawIdle();}
dice.onload=ready;vfx.onload=ready;
