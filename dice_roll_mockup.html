<style>

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
const result=document.getElementById('result'),rollBtn=document.getElementById('roll'),countsEl=document.getElementById('counts');
const LAYOUT={1:[[180,180]],2:[[110,180],[250,180]],4:[[108,108],[252,108],[108,252],[252,252]]};
const ROTS=[0,90,180,270];
let count=1,rolling=false,lastFaces=[1];
function drawSheet(img,sx,sy,cx,cy,rot,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(cx,cy);ctx.rotate(rot*Math.PI/180);ctx.scale(S,S);
  ctx.drawImage(img,sx,sy,FW,FW,-48,-48,FW,FW);ctx.restore();
}
function clearBg(){ctx.globalAlpha=1;ctx.fillStyle=BG;ctx.fillRect(0,0,VIEW,VIEW);}
function drawFace(n,cx,cy){drawSheet(dice,1*FW,(n-1)*FW,cx,cy,0,1);}
function drawSpec(sp,cx,cy){
  drawSheet(dice,sp.f*FW,(sp.n-1)*FW,cx,cy,sp.rot,1);
  if(sp.whisp&&sp.wa>0)for(const rc of sp.whisp)drawSheet(vfx,rc[1]*FW,rc[0]*FW,cx,cy,sp.rot,sp.wa);
}
function rand6(){return 1+Math.floor(Math.random()*6);}
function sample2(){let a=Math.floor(Math.random()*6),b;do{b=Math.floor(Math.random()*6);}while(b===a);return[a,b];}
function forbidden(p){const s=p.slice().sort().join();return s==='0,1'||s==='2,3';}
function pickRows(){if(Math.random()<0.8)return[Math.floor(Math.random()*6)];let r;do{r=sample2();}while(forbidden(r));return r;}
function buildSeq(T){
  let s=[];
  for(let rv=0;rv<8;rv++){
    const n=rand6(),rot=ROTS[Math.floor(Math.random()*4)],rows=pickRows();
    const wdir=Math.random()<0.6?[0,1,2]:[2,1,0];
    for(let j=0;j<3;j++)s.push({n:n,f:j,whisp:rows.map(r=>[r,wdir[j]]),rot:rot});
  }
  s.push({n:T,f:0,whisp:[[Math.floor(Math.random()*6),1]],rot:ROTS[Math.floor(Math.random()*4)]});
  return s;
}
function drawIdle(){clearBg();for(let k=0;k<count;k++)drawFace(lastFaces[k]||1,LAYOUT[count][k][0],LAYOUT[count][k][1]);}
function setEnabled(b){rollBtn.disabled=!b;countsEl.querySelectorAll('button').forEach(x=>x.disabled=!b);}
function roll(){
  if(rolling||!dice.complete||!vfx.complete)return;
  rolling=true;setEnabled(false);result.innerHTML='&nbsp;';
  const Ts=[],seqs=[];
  for(let k=0;k<count;k++){const T=rand6();Ts.push(T);seqs.push(buildSeq(T));}
  const L=seqs[0].length,durs=[];
  for(let i=0;i<L;i++){const t=i/(L-1);durs.push(Math.round(67+(200-67)*Math.pow(t,1.7)));}
  let i=0;
  (function step(){
    if(i<L){
      const t=i/(L-1),wa=t<0.8?1:Math.max(0.2,1-(t-0.8)*4);
      clearBg();
      for(let k=0;k<count;k++){const sp=seqs[k][i];sp.wa=wa;drawSpec(sp,LAYOUT[count][k][0],LAYOUT[count][k][1]);}
      const d=durs[i];i++;setTimeout(step,d);
    } else if(i<L+2){
      clearBg();for(let k=0;k<count;k++)drawFace(Ts[k],LAYOUT[count][k][0],LAYOUT[count][k][1]);
      i++;setTimeout(step,i===L+1?320:500);
    } else {
      lastFaces=Ts.slice();
      const total=Ts.reduce((a,b)=>a+b,0);
      result.textContent=count===1?('You rolled '+total):(Ts.join(' + ')+' = '+total);
      rolling=false;setEnabled(true);
    }
  })();
}
countsEl.addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||rolling)return;
  count=parseInt(b.dataset.c);
  countsEl.querySelectorAll('button').forEach(x=>x.classList.toggle('sel',x===b));
  lastFaces=[];result.innerHTML='&nbsp;';drawIdle();
});
rollBtn.addEventListener('click',roll);
let loaded=0;function ready(){loaded++;if(loaded===2)drawIdle();}
dice.onload=ready;vfx.onload=ready;
</script></body></html>
